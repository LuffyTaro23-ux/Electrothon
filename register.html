<!DOCTYPE html>
<html>
<head>
<title>Register - InternTrack</title>

<style>
/* ---------- BODY ---------- */

body{
margin:0;
font-family:'Segoe UI',sans-serif;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
color:white;

background: linear-gradient(-45deg,#6a11cb,#2575fc,#1e3c72,#2a5298);
background-size:400% 400%;

animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}


/* ---------- REGISTER BOX ---------- */

.register-box{

background:rgba(255,255,255,0.08);

padding:40px;

width:320px;

border-radius:15px;

text-align:center;

backdrop-filter:blur(12px);

box-shadow:0 10px 30px rgba(0,0,0,0.4);

animation: fadeUp 1.2s ease;
}


/* ---------- HEADING ---------- */

h2{

font-size:28px;
margin-bottom:20px;

background:linear-gradient(90deg,#ffffff,#00f2ff,#ffffff);
background-size:200%;

-webkit-background-clip:text;
background-clip:text;
color:transparent;

animation: shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:0%;}
100%{background-position:200%;}
}


/* ---------- INPUT ---------- */

input{

width:100%;

padding:12px;

margin:12px 0;

border:none;
border-radius:8px;

background:rgba(255,255,255,0.15);

color:white;
outline:none;

transition:0.3s;
}

input::placeholder{
color:rgba(255,255,255,0.7);
}

input:focus{

background:rgba(255,255,255,0.25);

box-shadow:
0 0 6px rgba(0,242,255,0.8),
0 0 12px rgba(0,242,255,0.4);
}


/* ---------- BUTTON ---------- */

button{

width:100%;

padding:12px;

border:none;
border-radius:25px;

background:white;

color:#6a11cb;

font-weight:600;

cursor:pointer;

transition:0.3s;
}

button:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:
0 0 10px rgba(255,255,255,0.8),
0 0 20px rgba(0,242,255,0.7);
}


/* ---------- LINKS ---------- */

a{
color:#00f2ff;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}


/* ---------- ANIMATION ---------- */

@keyframes fadeUp{

0%{
opacity:0;
transform:translateY(40px);
}

100%{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<form onsubmit="return registerUser()">

<!-- <input id="name" type="text" placeholder="Full Name"> -->

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button type="submit">Register</button>

</form>

<p>Already have an account?</p>

<a href="login.html">Login</a>

</div>

<script src="web.js"></script>

</body>
</html>
